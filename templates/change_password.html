{% extends "layout.html" %}

{% block title %}
    Change Password
{% endblock %}

{% block main %}
<div class="container py-5 d-flex justify-content-center align-items-center">

    <div class="card border-0 shadow-sm rounded-3" style="width: 100%; max-width: 480px;">

        <div class="card-header bg-white border-bottom-0 pt-4 pb-2 px-4 text-center">
            <div class="bg-light rounded-circle d-inline-flex justify-content-center align-items-center mb-3" style="width: 60px; height: 60px;">
                <span class="fs-2">🔐</span>
            </div>
            <h4 class="fw-bold text-dark mb-1">Update Password</h4>
            <p class="text-muted" style="font-size: 0.9rem;">Please enter your current password and choose a new, secure password.</p>
        </div>

        <div class="card-body p-4 pt-2">
            <form action="/change_password" method="POST">

                <div class="mb-4">
                    <label for="old_password" class="form-label text-muted fw-semibold" style="font-size: 0.85rem;">Current Password</label>
                    <input type="password" class="form-control form-control-lg bg-light border-0 shadow-none focus-ring-dark"
                           id="old_password" name="old_password" placeholder="Enter current password" required autofocus>
                </div>

                <hr class="text-muted mb-4 opacity-25">

                <div class="mb-3">
                    <label for="new_password" class="form-label text-muted fw-semibold" style="font-size: 0.85rem;">New Password</label>
                    <input type="password" class="form-control form-control-lg bg-light border-0 shadow-none focus-ring-dark"
                           id="new_password" name="new_password" placeholder="Enter new password" required>
                    <div class="form-text mt-2" style="font-size: 0.75rem;">
                        <span class="text-success fw-bold me-1">✓</span> Minimum 8 characters recommended
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmation" class="form-label text-muted fw-semibold" style="font-size: 0.85rem;">Confirm New Password</label>
                    <input type="password" class="form-control form-control-lg bg-light border-0 shadow-none focus-ring-dark"
                           id="confirmation" name="confirmation" placeholder="Verify new password" required>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-dark btn-lg fw-bold shadow-sm" style="font-size: 1rem;">
                        Update Security Credentials
                    </button>
                    <a href="javascript:history.back()" class="btn btn-link text-muted text-decoration-none fw-semibold mt-2" style="font-size: 0.85rem;">
                        Cancel and return
                    </a>
                </div>

            </form>
        </div>
    </div>

</div>
{% endblock %}
