{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block body_class %}landing-page-bg{% endblock %}

{% block main %}
    <div class="auth-card text-start">

        <div class="text-center mb-4">
            <div class="mb-3 text-primary fs-1">🏢</div>
            <h2 class="fw-bold text-dark">Create an Account</h2>
            <p class="text-muted">Join OrderFlow to start managing your bulk orders.</p>
        </div>

        <form action="/register" method="post">
            <div class="mb-3">
                <label for="first_name" class="form-label fw-semibold text-dark">First Name</label>
                <input autocomplete="off" autofocus class="form-control form-control-lg bg-light" id="first_name" name="first_name" placeholder="Enter your first name" type="text" required>
            </div>

            <div class="mb-3">
                <label for="last_name" class="form-label fw-semibold text-dark">Last Name</label>
                <input autocomplete="off" autofocus class="form-control form-control-lg bg-light" id="last_name" name="last_name" placeholder="Enter your last name" type="text">
            </div>

            <div class="mb-3">
                <label for="company_name" class="form-label fw-semibold text-dark">Company Name</label>
                <input autocomplete="off" autofocus class="form-control form-control-lg bg-light" id="company_name" name="company_name" placeholder="Your company name" type="text" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-semibold text-dark">Email</label>
                <input autocomplete="off" autofocus class="form-control form-control-lg bg-light" id="email" name="email" placeholder="Enter your work email" type="text" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold text-dark">Password</label>
                <input class="form-control form-control-lg bg-light" id="password" name="password" placeholder="Create a password" type="password" required>
            </div>

            <div class="mb-4">
                <label for="confirmation" class="form-label fw-semibold text-dark">Confirm Password</label>
                <input class="form-control form-control-lg bg-light" id="confirmation" name="confirmation" placeholder="Verify your password" type="password" required>
            </div>

            <button class="btn btn-primary btn-lg w-100 fw-bold" type="submit">Create Account</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted mb-0" style="font-size: 0.9rem;">
                Already have a client account? <a href="/login" class="text-decoration-none fw-bold text-primary">Log in here</a>
            </p>
        </div>

    </div>
{% endblock %}
